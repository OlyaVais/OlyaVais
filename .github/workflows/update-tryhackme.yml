name: Update TryHackMe Badge

on:
  schedule:
    - cron: '0 0 * * *'   # каждый день в 00:00 UTC
  workflow_dispatch:       # разрешаем запуск вручную

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download TryHackMe badge
        run: |
          mkdir -p assets
          curl -L https://tryhackme-badges.s3.amazonaws.com/olgakesha59.png -o assets/thm_propic.png
        continue-on-error: false

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add assets/thm_propic.png
          git diff --staged --quiet || git commit -m "Update TryHackMe badge"
          git push
